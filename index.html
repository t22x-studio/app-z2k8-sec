                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Abort overlapping queues
                    
                    const mainUtterance = new SpeechSynthesisUtterance(word);
                    mainUtterance.lang = 'ko-KR';
                    
                    if (sentence) {
                        mainUtterance.onend = () => {
                            setTimeout(() => {
                                const sentenceUtterance = new SpeechSynthesisUtterance(sentence);
                                sentenceUtterance.lang = 'ko-KR';
                                window.speechSynthesis.speak(sentenceUtterance);

                    window.speechSynthesis.speak(mainUtterance);

                const a = document.createElement('a');
                a.href = url;
                a.download = "korean_progress_backup.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                    try {

                        if (parsed.deck && parsed.progress) {
                            setDeck(parsed.deck);
                            setProgress(parsed.progress);
                            showToast("Data and progress restored!");
                        } else if (Array.isArray(parsed)) {
                            setDeck(parsed);
                            showToast("Vocabulary deck updated!");
                        } else {
                            throw new Error();
                        }

                        showToast("Invalid backup file structure.", "error");

                event.target.value = '';

                const numbers = new Set();
                deck.forEach(c => {
                    if (c.id && c.id.startsWith('topik_')) {
                        const parts = c.id.split('_');
                        if (parts.length > 1) {
                            const num = parseInt(parts[1], 10);
                            if (!isNaN(num)) numbers.add(num);
                        }

                return Array.from(numbers).sort((a, b) => a - b);
            }, [deck]);

            const getStatus = (id) => {
                if (progress.known.includes(id)) return 'known';
                if (progress.seen.includes(id)) return 'seen';
                if (progress.unknown.includes(id)) return 'unknown';

                // 1. Filter out already 'known' cards first

                    const prefix = `topik_${activeBatch}_`;
                    candidates = candidates.filter(c => c.id.startsWith(prefix));

                if (candidates.length === 0) { 
                    setCurrentCard(null); 
                    return; 
                }
                
                const randomCard = candidates[Math.floor(Math.random() * candidates.length)];
                const exList = randomCard.examples || [];

                if (!currentCard) return;
                const id = currentCard.id;
                const newProg = { ...progress };
                ['known', 'seen', 'unknown'].forEach(k => {
                    newProg[k] = newProg[k].filter(x => x !== id);
                });
                newProg[grade].push(id);
                setProgress(newProg);

                const labelMap = { unknown: 'HARD', seen: 'UNSURE', known: 'EASY' };
                showToast(`Marked as ${labelMap[grade]}!`, "info");
                drawCard();

                                    <button 
                                        onClick={() => updateStatus(previewCard.id, 'seen')}
                                        className={`py-2 rounded-xl text-[10px] font-black uppercase transition-all border text-center ${
                                            currentStatus === 'seen' 
                                                ? 'bg-amber-400 border-amber-500 text-slate-900' 
                                                : 'bg-amber-50 border-amber-100 text-amber-700 hover:bg-amber-100'
                                        }`}
                                    >
                                        Unsure
                                    </button>
                                    <button 
                                        onClick={() => updateStatus(previewCard.id, 'known')}
                                        className={`py-2 rounded-xl text-[10px] font-black uppercase transition-all border text-center ${
                                            currentStatus === 'known' 
                                                ? 'bg-emerald-500 border-emerald-600 text-white' 
                                                : 'bg-emerald-50 border-emerald-100 text-emerald-600 hover:bg-emerald-100'
                                        }`}
                                    >
                                        Easy
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                // --- WORD BANK MAIN LIST ---
                return (
                    <div className="h-full flex flex-col bg-slate-50 text-slate-800">
                        {/* Header + Stats Dashboard */}
                        <div className="p-4 border-b border-slate-100 bg-white/95 backdrop-blur sticky top-0 z-20 shadow-sm">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-2xl font-black tracking-tight text-slate-800">Word Bank</h2>
                                <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border border-slate-200">
                                    {filteredDeck.length} found
                                </span>
                            </div>

                            {/* Search Bar Input */}
                            <div className="relative mb-3">
                                <span className="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400">
                                    <Icon name="search" size={18} />
                                </span>
                                <input 
                                    type="text" 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search by Korean, Eng, Chinese, Jap..."
                                    className="w-full bg-slate-100 text-slate-800 rounded-xl pl-10 pr-10 py-2.5 text-sm font-medium border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all placeholder:text-slate-400"
                                />
                                {searchTerm && (
                                    <button 
                                        onClick={() => setSearchTerm('')}
                                        className="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600"
                                    >
                                        <Icon name="close" size={16} />
                                    </button>
                                )}
                            </div>

                            {/* Horizontal Filters */}
                            <div className="flex gap-1.5 overflow-x-auto no-scrollbar pb-1">
                                {[
                                    { id: 'all', label: 'ALL' },
                                    { id: 'known', label: 'EASY', color: 'bg-emerald-500' },
                                    { id: 'seen', label: 'UNSURE', color: 'bg-amber-400' },
                                    { id: 'unknown', label: 'HARD', color: 'bg-rose-500' },
                                    { id: 'new', label: 'NEW', color: 'bg-slate-400' }
                                ].map(f => (
                                    <button 
                                        key={f.id} 
                                        onClick={() => setListFilter(f.id)} 
                                        className={`px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase transition-all whitespace-nowrap flex items-center gap-1.5 border ${
                                            listFilter === f.id 
                                                ? 'bg-indigo-600 text-white border-indigo-500 shadow-md shadow-indigo-600/10' 
                                                : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >
                                        {f.id !== 'all' && (
                                            <span className={`w-1.5 h-1.5 rounded-full ${f.color}`} />
                                        )}
                                        {f.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* List viewport - touch scroll active */}
                        <div className="flex-1 overflow-y-auto scroll-touch p-4 space-y-2 no-scrollbar">
                            {filteredDeck.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-16 text-center">
                                    <span className="text-4xl mb-3">🔍</span>
                                    <p className="text-slate-400 text-sm">No cards match your query.</p>
                                </div>
                            ) : (
                                filteredDeck.map(c => {
                                    const status = getStatus(c.id);
                                    let statusColor = "bg-slate-100 text-slate-400";
                                    if (status === 'known') statusColor = "bg-emerald-100 text-emerald-700 border border-emerald-200/50";
                                    if (status === 'seen') statusColor = "bg-amber-100 text-amber-800 border border-amber-200/50";
                                    if (status === 'unknown') statusColor = "bg-rose-100 text-rose-700 border border-rose-200/50";
                                    
                                    return (
                                        <div 
                                            key={c.id} 
                                            onClick={() => setPreviewCard(c)} 
                                            className="flex justify-between items-center p-3.5 bg-white hover:bg-slate-50 border border-slate-150 rounded-2xl active:scale-[0.98] transition-all cursor-pointer shadow-sm group"
                                        >
                                            <div className="flex items-center gap-3.5 min-w-0">
                                                <span className="text-2xl select-none filter drop-shadow-sm group-hover:scale-110 duration-250 transition-transform">{c.emoji || "📝"}</span>
                                                <div className="min-w-0">
                                                    <div className="font-extrabold text-slate-800 text-base leading-tight">{c.korean}</div>
                                                    <div className="text-xs text-slate-400 truncate mt-0.5">{c.english.split('💡')[0].trim()}</div>
                                                </div>
                                            </div>
                                            <span className={`text-[9px] font-black tracking-widest px-2.5 py-1 rounded-full uppercase shrink-0 ${statusColor}`}>
                                                {status === 'new' ? 'NEW' : status === 'known' ? 'EASY' : status === 'seen' ? 'UNSURE' : 'HARD'}
                                            </span>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                );
            };

            const renderSettings = () => (
                <div className="h-full flex flex-col bg-slate-50 text-slate-800 overflow-y-auto scroll-touch no-scrollbar p-5">
                    <h2 className="text-2xl font-black tracking-tight mb-5 text-slate-800">Data & Settings</h2>
                    
                    <div className="space-y-5 pb-8">
                        {/* 1. Import Panel */}
                        <div className="bg-white p-5 rounded-2xl border border-slate-150 shadow-sm">
                            <h3 className="font-extrabold text-slate-800 mb-2.5 flex items-center gap-2">
                                <Icon name="copy" size={18} className="text-indigo-600"/> 
                                <span>1. Import New Cards</span>
                            </h3>
                            <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                                Paste the structured JSON code generated by your AI system here to expand your study deck instantly.
                            </p>
                            <textarea 
                                value={importText} 
                                onChange={(e) => setImportText(e.target.value)} 
                                className="w-full h-24 p-3 bg-slate-50 rounded-xl text-xs font-mono border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500 mb-3 text-slate-800 placeholder:text-slate-400" 
                                placeholder="Paste JSON here..."
                            ></textarea>
                            <button 
                                onClick={handleImport} 
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-bold text-sm shadow-md transition-all active:scale-98"
                            >
                                Load Custom Words
                            </button>
                        </div>

                        {/* 2. Save Codebase Panel */}
                        <div className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 shadow-sm">
                            <h3 className="font-extrabold text-indigo-900 mb-2 flex items-center gap-2">
                                <span>💾</span>
                                <span>2. Deploy & Save Data</span>
                            </h3>
                            <p className="text-xs text-indigo-700/80 mb-3 leading-relaxed">
                                Export your consolidated vocabulary collection to secure progress permanently.
                            </p>
                            <button 
                                onClick={copyMasterData} 
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-all flex items-center justify-center gap-2"
                            >
                                <Icon name="copy" size={16} />
                                <span>Copy All Data to Clipboard</span>
                            </button>
                            <p className="text-[10px] text-indigo-500/80 mt-2.5 text-center">
                                Paste it inside the "INITIAL_DATA" block inside your offline HTML file.
                            </p>
                        </div>

                        {/* 3. External Dictionary Hook */}
                        <div className="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100 shadow-sm">
                            <h3 className="font-extrabold text-emerald-900 mb-2 flex items-center gap-2">
                                <Icon name="link" size={18} className="text-emerald-600"/>
                                <span>3. Audio Dictionary</span>
                            </h3>
                            <p className="text-xs text-emerald-800/80 mb-3.5 leading-relaxed">
                                Audibly reference high-fidelity native pronunciation records directly from the live global database.
                            </p>
                            <a 
                                href="https://ko.forvo.com/search/" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="block w-full bg-white border border-emerald-200 hover:bg-emerald-50 text-emerald-700 text-center py-3 rounded-xl font-bold text-sm transition-all shadow-sm"
                            >
                                Open Forvo Search Engine ↗
                            </a>
                        </div>

                        {/* 4. Complete System Reset */}
                        <div className="bg-rose-50 p-5 rounded-2xl border border-rose-200">
                            <h3 className="font-extrabold text-rose-700 mb-2 flex items-center gap-2">
                                <Icon name="trash" size={18} className="text-rose-600" />
                                <span>Reset Storage</span>
                            </h3>
                            <p className="text-xs text-rose-600/80 mb-3 leading-relaxed">
                                Reset progress logs, scores, and custom imported items. Returns to baseline demo set.
                            </p>
                            <button 
                                onClick={triggerReset} 
                                className="w-full bg-white hover:bg-rose-50 border border-rose-200 text-rose-600 py-2.5 rounded-xl font-bold text-xs shadow-sm"
                            >
                                Factory System Reset
                            </button>
                        </div>

                        {/* 5. File Backup Manager */}
                        <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 shadow-sm">
                            <h3 className="font-extrabold text-indigo-900 mb-2.5 flex items-center gap-2">
                                <span>💾</span>
                                <span>5. File Transfer System</span>
                            </h3>
                            <p className="text-xs text-indigo-700 mb-4 leading-relaxed">
                                Save or restore your vocabulary collection along with your exact "Hard, Easy, New" status flags directly via JSON file.
                            </p>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={exportProgress} className="bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-xl font-bold text-xs shadow-md transition-all active:scale-95 text-center">
                                    Download Backup
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="bg-white border border-indigo-200 hover:bg-indigo-50 text-indigo-700 py-2.5 px-4 rounded-xl font-bold text-xs shadow-sm transition-all active:scale-95 text-center">
                                    Upload JSON File
                                </button>
                            </div>
                            <input type="file" ref={fileInputRef} onChange={importProgress} className="hidden" accept=".json" />
                        </div>

                    </div>
                </div>
            );

            return (
                <div className="w-full h-full md:h-[92vh] md:max-h-[850px] md:max-w-md bg-white md:shadow-2xl md:rounded-[40px] md:border-8 md:border-slate-200 relative overflow-hidden transition-all duration-300 flex flex-col border-slate-100">
                    
                    {/* Active View Body Canvas */}
                    <div className="flex-1 relative overflow-hidden min-h-0 bg-slate-50 pb-[74px]">
                        {view === 'game' ? renderGame() : view === 'list' ? renderList() : renderSettings()}
                    </div>

                    {/* Primary Dynamic Navigation Controller bar */}
                    <nav className="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe shadow-[0_-4px_24px_rgba(0,0,0,0.04)] z-40">
                        <div className="max-w-md mx-auto flex justify-around py-3">
                            <button 
                                onClick={() => { setPreviewCard(null); setView('game'); }} 
                                className={`flex flex-col items-center justify-center transition-all ${view === 'game' ? 'text-indigo-600 scale-105 font-bold' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <Icon name="game" size={24}/>
                                <span className="text-[9px] font-black tracking-widest mt-1 uppercase">PLAY</span>
                            </button>
                            <button 
                                onClick={() => { setPreviewCard(null); setView('list'); }} 
                                className={`flex flex-col items-center justify-center transition-all ${view === 'list' ? 'text-indigo-600 scale-105 font-bold' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <Icon name="list" size={24}/>
                                <span className="text-[9px] font-black tracking-widest mt-1 uppercase">WORDS</span>
                            </button>
                            <button 
                                onClick={() => { setPreviewCard(null); setView('import'); }} 
                                className={`flex flex-col items-center justify-center transition-all ${view === 'import' ? 'text-indigo-600 scale-105 font-bold' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <Icon name="settings" size={24}/><span className="text-[9px] font-black tracking-widest mt-1 uppercase">SETUP</span>
                            </button>
                        </div>
                    </nav>

                    {/* Premium In-App Toast System */}
                    {toast && (
                        <div className="absolute top-16 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-slate-100 border border-slate-700/80 px-4 py-2.5 rounded-2xl shadow-xl flex items-center gap-2 text-xs font-semibold text-center whitespace-nowrap">
                            <span>💡</span>
                            <span>{toast.message}</span>
                        </div>
                    )}

                    {/* Premium Confirmation Dialog Overlays */}
                    {modal && (
                        <div className="absolute inset-0 bg-black/50 backdrop-blur-[2px] flex items-center justify-center p-6 z-50 animate-fade-in">
                            <div className="bg-white border border-slate-200 rounded-3xl p-6 w-full max-w-xs shadow-2xl text-slate-800">
                                <h4 className="text-lg font-black tracking-tight text-slate-800 mb-2">{modal.title}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">{modal.body}</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={() => setModal(null)}
                                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-bold text-xs transition-colors"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={modal.onConfirm}
                                        className="bg-rose-600 hover:bg-rose-700 text-white py-2.5 rounded-xl font-bold text-xs transition-colors"
                                    >
                                        Confirm
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
